<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Earth</title>
    <!-- tailwind+daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- CSS File  -->
    <link rel="stylesheet" href="styles/style.css" />

  </head>
  <body class=" lg:w-[1920px]">
    <header class="max-h-[100px] ">
      <div class="navbar bg-[#15813C] shadow-sm px-5 md:px-[135px] text-white">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <ul class="menu menu-horizontal px-1 text-green-900 flex flex-col ">
                <li><a href="#about" class="text-base hover:border-b hover:border-green-900">About</a></li>
                <li><a href="#gallery" class="text-base hover:border-b hover:border-green-900">Gallery</a></li>
                <li>
                  <a href="#plant-tree" class="text-base hover:border-b hover:border-green-900">Plant a Tree</a>
                </li>
              </ul>
            </ul>
          </div>
          <a class="text-lg md:text-2xl font-semibold cursor-pointer" href="#">Green Earth</a>
        </div>
        <div class="navbar-center hidden lg:flex">
          <ul class="menu menu-horizontal px-1">
            <li><a href="#about" class="text-base">About</a></li>
            <li><a href="#gallery" class="text-base">Gallery</a></li>
            <li><a href="#plant-tree" class="text-base">Plant a Tree</a></li>
          </ul>
        </div>
        <div class="navbar-end cursor-pointer">
          <a class="btn bg-[#fbcd15] text-[#15813c] rounded-4xl border-none hover:bg-white hover:text-black">Plant a Tree</a>
        </div>
      </div>
    </header>

    <section class="hero bg-[#cef0dd] md:h-[383px] " id="hero">
      <div class="hero mx-auto flex flex-col md:flex-row justify-around p-10 md:p-0 space-y-5">
        <div><img src="assets/hero-leaf1.png" alt=""></div>
        <div class="flex flex-col justify-center items-center gap-5 ">
          <h1 class="font-bold text-5xl text-center">Plant a Tree, Grow a Future</h1>
          <p class="text-center text-xl ">Join our mission to plant 1 million trees and make the Earth greener for future<br class="hidden md:block">
          generations.</p>
            <a class="btn bg-[#fbcd15] text-[#15813c] rounded-4xl border-none hover:bg-white hover:text-black">Get Involved</a>
        </div>
        <div><img src="assets/hero-leaf2.png" alt=""></div>
      </div>
    </section>



    
    <script src="./script/index.js"></script>
  </body>
</html>
